name: Release

# 推 tag(形如 v0.3.0)自动构建 Windows 产物并上传到 GitHub Release。
# 触发后约 4-6 分钟可完成,完成后 Cloudflare Worker 会在 5 分钟内更新 manifest,
# 老版客户端自动收到升级通知。
#
# 也支持手动触发(workflow_dispatch),用来重跑或测试。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag(必须已存在,例如 v0.3.0)'
        required: true
        type: string

permissions:
  contents: write  # 创建 Release + 上传 asset 需要

jobs:
  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (Windows amd64)
        run: wails build -platform windows/amd64 -clean -trimpath

      - name: Package & checksum
        id: pack
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.tag || github.ref_name }}"
          $ver = $ref -replace '^v', ''
          $src = "build/bin/ToolForge.exe"
          if (-not (Test-Path $src)) {
            Write-Error "build product not found at $src"
            exit 1
          }
          $assetName = "ToolForge-$ver-windows-amd64.exe"
          $dst = "build/bin/$assetName"
          Move-Item -Path $src -Destination $dst

          $hash = (Get-FileHash $dst -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $dst).Length

          Write-Host "Asset:  $dst"
          Write-Host "Size:   $size bytes"
          Write-Host "SHA256: $hash"

          "asset_path=$dst"      | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$ver"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256=$hash"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "size=$size"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ steps.pack.outputs.asset_path }}
          # 行为说明:
          # - release 已存在(手动 draft 过 / 旧的 release):只追加 asset,不动 release body
          # - release 不存在:用下面的 body 创建一个简易版,用户可后续到网页编辑补全
          # append_body=true 让 body 字段以"追加"模式写入,不覆盖现有 notes
          append_body: true
          body: |

            ---

            ### 📦 Windows 下载

            - 文件名:`${{ steps.pack.outputs.asset_name }}`
            - 大小:${{ steps.pack.outputs.size }} bytes
            - SHA256:`${{ steps.pack.outputs.sha256 }}`

            > Cloudflare Worker 会在 5 分钟内开始向老版本客户端推送本次更新。
            > 在 release notes 里加 `[critical]` 标记可触发客户端的关键更新提示。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
